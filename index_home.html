<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nails & Hairstyle Ideas</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0f0f13;
      color: #f5f5f5;
    }

    header {
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15,15,19,0.7);
      backdrop-filter: blur(12px);
      z-index: 1000;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      color: #e8c27a;
    }

    nav a {
      margin-left: 30px;
      text-decoration: none;
      color: #ccc;
    }

    nav a:hover { color: #e8c27a; }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      background: radial-gradient(circle at top, #1a1a22, #0f0f13);
    }

    .hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .hero p {
      color: #aaa;
      margin-bottom: 30px;
    }

    .section {
      padding: 100px 60px;
      max-width: 1200px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .item {
      border-radius: 15px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    .item img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      transition: 0.4s;
    }

    .item:hover img {
      transform: scale(1.1);
    }

    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
    }

    .overlay h4 {
      margin-bottom: 5px;
    }

    .overlay span {
      font-size: 14px;
      color: #ccc;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #777;
    }

    @media(max-width:768px){
      header { padding:20px; }
      .section { padding:80px 20px; }
      .hero h2 { font-size:2.2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Jokozoikum</h1>
  <nav>
    <a href="/nails">Nails</a>
    <a href="/hairstyles">Hairstyles</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>Nails Art & Hairstyle Ideas</h2>
    <p>Find the latest style inspiration for your best look</p>
  </div>
</section>

<section class="section">
  <h3 style="margin-bottom:30px; color:#e8c27a;">Trending Ideas</h3>

  <div class="grid">

    <div class="item" onclick="goTo('nails')">
      <img src="https://images.unsplash.com/photo-1604654894610-df63bc536371" />
      <div class="overlay">
        <h4>Nail Art Trends</h4>
        <span>Click Here</span>
      </div>
    </div>

    <div class="item" onclick="goTo('hairstyles')">
      <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9" />
      <div class="overlay">
        <h4>Hairstyle Trends</h4>
        <span>Click Here</span>
      </div>
    </div>

  </div>
</section>

<footer>
  © 2026 Jokozoikum — Nails & Hairstyle Ideas
</footer>

<script>
  function goTo(page){
    window.location.href = '/' + page;
  }
</script>

</body>
</html>
